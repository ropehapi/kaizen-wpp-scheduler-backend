    - ScheduleTypeRecurring
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.UpdateScheduleRequest:
    properties:
      contacts:
        items:
          $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.CreateContactRequest'
        minItems: 1
        type: array
      frequency:
        $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Frequency'
      message:
        type: string
      scheduledAt:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleType'
