        - once
        - recurring
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_pkg_response.APIResponse:
    properties:
      data: {}
      error:
        type: string
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_pkg_response.PaginatedResponse:
    properties:
      data: {}
      error:
        type: string
