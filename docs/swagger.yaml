      name:
        type: string
      phone:
        type: string
      scheduleId:
        type: string
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.CreateContactRequest:
    properties:
      name:
        type: string
      phone:
        type: string
    required:
    - name
    - phone
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.CreateScheduleRequest:
    properties:
      contacts:
        items:
          $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.CreateContactRequest'
        minItems: 1
        type: array
      frequency:
        $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Frequency'
      message:
        type: string
      scheduledAt:
        type: string
      type:
        allOf:
        - $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleType'
        enum:
        - once
        - recurring
    required:
    - contacts
    - message
    - scheduledAt
    - type
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Frequency:
    enum:
    - daily
    - weekly
    - monthly
    type: string
    x-enum-varnames:
    - FrequencyDaily
    - FrequencyWeekly
    - FrequencyMonthly
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Schedule:
    properties:
      contacts:
        items:
          $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Contact'
        type: array
      createdAt:
        type: string
      frequency:
        $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.Frequency'
      id:
        type: string
      message:
        type: string
      scheduledAt:
        type: string
      status:
        $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleStatus'
      type:
        $ref: '#/definitions/github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleType'
      updatedAt:
        type: string
    type: object
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleStatus:
    enum:
    - scheduled
    - sent
    - canceled
    type: string
    x-enum-varnames:
    - ScheduleStatusScheduled
    - ScheduleStatusSent
    - ScheduleStatusCanceled
  github_com_ropehapi_kaizen-wpp-scheduler-backend_internal_domain.ScheduleType:
    enum:
